<!doctype html>
<html lang="en" data-theme="%theme%" data-font="%font%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#1a1a2e" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		<!-- Preload the active prose font's regular-weight variable WOFF2 so
		     post bodies paint in the user's chosen face on first frame instead
		     of swapping in after the system fallback. Only the upright file is
		     preloaded — italic is rare enough that on-demand loading is fine.
		     `%font%` is substituted server-side in `src/hooks.server.ts` from
		     `event.locals.font` (resolved by `+layout.server.ts` from the
		     session). `crossorigin` is required even for same-origin font
		     preloads — fonts are always fetched in CORS mode. -->
		<link
			rel="preload"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
			href="/fonts/%font%/%font%.woff2"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap">
		<div class="min-h-screen flex flex-col">%sveltekit.body%</div>
	</body>
</html>
